<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D/3D Note & Analytics App</title>
    
    <!-- Bulletproof Internal CSS (အင်တာနက်မလိုဘဲ အလုပ်လုပ်သည်) -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f3f4f6; padding: 16px; color: #333; }
        
        /* Grid Layout */
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        @media (min-width: 768px) {
            .container { grid-template-columns: repeat(3, 1fr); }
            .md-span-2 { grid-column: span 2; }
            .md-span-3 { grid-column: span 3; }
            .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        }

        /* 2D Live Card */
        .live-card { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; justify-content: space-between; min-height: 280px; }
        .live-title { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .ping-dot { width: 10px; height: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        .live-number { text-align: center; font-size: 4.5rem; font-weight: 800; margin: 20px 0; tracking-spacing: 2px; }
        .live-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.9rem; }
        
        /* White Box Panels */
        .panel { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .panel-title { font-size: 1.25rem; font-weight: bold; color: #1f2937; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .icon-svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }

        /* Form Styling */
        .form-group-wrapper { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 480px) { .form-group-wrapper { grid-template-columns: repeat(3, 1fr); } }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #4b5563; margin-bottom: 5px; }
        .form-group input { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 1rem; outline: none; }
        .form-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
        .btn-submit { width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: #4338ca; }

        /* Table Styling */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th { background-color: #f9fafb; padding: 10px; color: #6b7280; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #e5e7eb; }
        td { padding: 12px 10px; border-bottom: 1px solid #e5e7eb; color: #374151; }
        .text-right { text-align: right; }
        .text-indigo { color: #4f46e5; font-weight: bold; }
        .text-emerald { color: #059669; font-weight: bold; }
        .empty-text { text-align: center; color: #9ca3af; padding: 20px 0; }

        /* Animations */
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- အပိုင်း ၁ - 2D LIVE RESULT -->
        <div class="live-card">
            <div>
                <div class="live-title">
                    <!-- Broadcast/Live Icon -->
                    <svg class="icon-svg" style="stroke-width: 2.5;" viewBox="0 0 24 24"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/></svg>
                    2D Live Result
                    <span class="ping-dot" style="margin-left: auto;"></span>
                </div>
                <p style="font-size: 0.75rem; color: #ddd; margin-top: 4px;">ထိုင်းစတော့အိတ်ချိန်း Live တန်ဖိုး</p>
            </div>
            
            <div class="live-number" id="live-2d">--</div>
            
            <div class="live-details">
                <div>SET: <span id="live-set" style="font-weight:bold;">--</span></div>
                <div>VALUE: <span id="live-value" style="font-weight:bold;">--</span></div>
            </div>
            
            <p id="live-time" style="text-align: right; font-size: 0.7rem; color: #ddd; margin-top: 10px;">နောက်ဆုံးအပ်ဒိတ်: --:--:--</p>
        </div>

        <!-- အပိုင်း ၂ - စာရင်းသွင်းရန် FORM -->
        <div class="panel md-span-2">
            <div class="panel-title" style="color: #4f46e5;">
                <!-- Edit/Note Icon -->
                <svg class="icon-svg" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                စာရင်းအသစ်မှတ်ရန်
            </div>
            
            <form id="noteForm">
                <div class="form-group-wrapper">
                    <div class="form-group">
                        <label>အမည်</label>
                        <input type="text" id="name" required placeholder="မောင်မောင်">
                    </div>
                    <div class="form-group">
                        <label>ဂဏန်း (2D/3D)</label>
                        <input type="number" id="number" required placeholder="85">
                    </div>
                    <div class="form-group">
                        <label>ထိုးကြေး (ကျပ်)</label>
                        <input type="number" id="amount" required placeholder="1000">
                    </div>
                </div>
                <button type="submit" class="btn-submit">သိမ်းဆည်းမည်</button>
            </form>
        </div>

        <!-- အပိုင်း ၃ - ANALYTICS -->
        <div class="panel md-span-3 grid-2col">
            
            <!-- အထိုးအများဆုံး ဇယား -->
            <div>
                <div class="panel-title" style="font-size: 1.1rem; color: #dc2626;">
                    <!-- Flame/Hot Icon -->
                    <svg class="icon-svg" stroke-width="2" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                    အထိုးအများဆုံး နံပါတ်များ (အကြိမ်ရေ)
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>နံပါတ်</th>
                                <th class="text-right">ထိုးသည့်အကြိမ်ရေ</th>
                            </tr>
                        </thead>
                        <tbody id="top-counts-table">
                            <tr><td colspan="2" class="empty-text">ဒေတာမရှိသေးပါ</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ပိုက်ဆံအများဆုံး ဇယား -->
            <div>
                <div class="panel-title" style="font-size: 1.1rem; color: #16a34a;">
                    <!-- Dollar/Money Icon -->
                    <svg class="icon-svg" stroke-width="2" viewBox="0 0 24 24"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    ပိုက်ဆံအများဆုံး နံပါတ်များ (စုစုပေါင်းကြေး)
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>နံပါတ်</th>
                                <th class="text-right">စုစုပေါင်းပမာဏ</th>
                            </tr>
                        </thead>
                        <tbody id="top-amounts-table">
                            <tr><td colspan="2" class="empty-text">ဒေတာမရှိသေးပါ</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // သင့်ထံမှ ရရှိသော Production Webhook URL များကို ထည့်သွင်းထားသည်
        const N8N_ADD_NOTE_URL = 'https://perseus484.app.n8n.cloud/webhook/add-note';
        const N8N_GET_ANALYTICS_URL = 'https://perseus484.app.n8n.cloud/webhook/get-analytics';

        // ၁။ စာရင်းသွင်းခြင်း လုပ်ဆောင်ချက်
        document.getElementById('noteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                number: document.getElementById('number').value,
                amount: parseInt(document.getElementById('amount').value)
            };

            try {
                const response = await fetch(N8N_ADD_NOTE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    alert('စာရင်းမှတ်သားပြီးပါပြီ။');
                    document.getElementById('noteForm').reset();
                    fetchAnalytics(); // ဒေတာအသစ်သွင်းပြီးလျှင် Analytics ချက်ချင်း update လုပ်မည်
                } else {
                    alert('အမှားအယွင်းရှိနေပါသည်။');
                }
            } catch (error) {
                alert('n8n နဲ့ ချိတ်ဆက်၍မရပါ။');
            }
        });

        // ၂။ စာရင်းအချက်အလက် (Analytics) ပြန်လည်ဆွဲယူပြသခြင်း
        async function fetchAnalytics() {
            try {
                const response = await fetch(N8N_GET_ANALYTICS_URL);
                const data = await response.json();

                const countsTable = document.getElementById('top-counts-table');
                countsTable.innerHTML = data.topCounts.length ? data.topCounts.map(item => `
                    <tr>
                        <td class="text-indigo">${item.number}</td>
                        <td class="text-right">${item.count} ကြိမ်</td>
                    </tr>
                `).join('') : '<tr><td colspan="2" class="empty-text">ဒေတာမရှိသေးပါ</td></tr>';

                const amountsTable = document.getElementById('top-amounts-table');
                amountsTable.innerHTML = data.topAmounts.length ? data.topAmounts.map(item => `
                    <tr>
                        <td class="text-emerald">${item.number}</td>
                        <td class="text-right">${item.amount.toLocaleString()} ကျပ်</td>
                    </tr>
                `).join('') : '<tr><td colspan="2" class="empty-text">ဒေတာမရှိသေးပါ</td></tr>';
            } catch (error) {
                console.error('Analytics Error:', error);
            }
        }

        // ၃။ 2D Live သရုပ်ပြစနစ်
        function simulateLive2D() {
            setInterval(() => {
                const set = (Math.random() * 1000 + 1300).toFixed(2);
                const value = (Math.random() * 10000 + 30000).toFixed(2);
                const lastDigitSet = set.split('.').pop().slice(-1);
                const lastDigitValue = value.split('.').pop().slice(-1);
                const live2D = lastDigitSet + lastDigitValue;

                document.getElementById('live-2d').innerText = live2D;
                document.getElementById('live-set').innerText = set;
                document.getElementById('live-value').innerText = value;
                document.getElementById('live-time').innerText = `နောက်ဆုံးအပ်ဒိတ်: ${new Date().toLocaleTimeString()}`;
            }, 3000);
        }

        // စတင်ပွင့်လာချိန်တွင် အလုပ်လုပ်မည့် စနစ်များ
        window.onload = () => {
            fetchAnalytics();
            simulateLive2D();
        };
    </script>
</body>
                                          </html>
